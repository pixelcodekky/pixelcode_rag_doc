
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_bot_db
    environment:
      POSTGRES_DB: rag_bot
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: postgresql
    ports:
      - "5432:5432"
    volumes:
      - rag_bot_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgresql -d rag_bot" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_bot_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=rag_bot;Username=postgresql;Password=postgresql
    depends_on:
      db:
        condition: service_healthy

volumes:
  rag_bot_postgres_data:
